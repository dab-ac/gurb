BOOT_ROOT=/efi
layout=uki
initrd_generator=dracut
uki_generator=ukify
# NB: MACHINE_ID=none is meant for portable images, not installed systems.
# We abuse it for short UKI filenames (6.17.0-14-generic.efi instead of
# 0710e2d4....-6.17.0-14-generic.efi). Breaks if multiple OS installs share
# one ESP — acceptable for our single-system use case.
MACHINE_ID=none
